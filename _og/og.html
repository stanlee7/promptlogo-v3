<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif;
    background: #0a0a0f;
    color: #e8e8ee;
    position: relative;
  }
  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 12% 18%, rgba(167,139,250,0.18) 0%, transparent 45%),
      radial-gradient(ellipse at 88% 90%, rgba(96,165,250,0.16) 0%, transparent 45%);
  }
  .wrap {
    position: relative; height: 100%;
    display: flex; align-items: center;
    padding: 0 72px; gap: 56px;
  }
  .left { flex: 1; }
  .brand { display: flex; align-items: center; gap: 18px; margin-bottom: 30px; }
  .mark {
    width: 84px; height: 84px; flex-shrink: 0;
    display: grid; place-items: center;
    background: linear-gradient(135deg, rgba(167,139,250,0.15), rgba(96,165,250,0.15));
    border: 1px solid #2a2a3a; border-radius: 20px;
  }
  .mark svg { filter: drop-shadow(0 0 12px rgba(167,139,250,0.5)); }
  h1 {
    font-size: 78px; font-weight: 800; letter-spacing: -2px;
    background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .tagline { font-size: 34px; font-weight: 700; line-height: 1.35; margin-bottom: 22px; }
  .tagline .hl {
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .sub { font-size: 21px; color: #8888a0; margin-bottom: 34px; line-height: 1.5; }
  .chips { display: flex; gap: 12px; flex-wrap: wrap; }
  .chip {
    font-size: 20px; font-weight: 600;
    padding: 12px 20px; border-radius: 999px;
    background: #16161f; border: 1px solid #2a2a3a;
  }
  .chip.ai {
    background: linear-gradient(135deg, rgba(167,139,250,0.18), rgba(96,165,250,0.18));
    border-color: rgba(167,139,250,0.5); color: #c4b5fd;
  }
  /* 오른쪽 프롬프트 미리보기 카드 */
  .card {
    width: 420px; flex-shrink: 0;
    background: #16161f; border: 1px solid rgba(167,139,250,0.4);
    border-radius: 22px; padding: 26px;
    box-shadow: 0 0 50px rgba(167,139,250,0.18);
    position: relative; overflow: hidden;
  }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px;
    background: linear-gradient(135deg, #a78bfa, #60a5fa); }
  .card-h { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .badge { width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, #a78bfa, #60a5fa); color: #0a0a0f;
    display: grid; place-items: center; font-weight: 800; font-size: 16px; }
  .card-h span { font-size: 20px; font-weight: 700; }
  .live { margin-left: auto; font-size: 14px; color: #34d399;
    background: rgba(52,211,153,0.12); padding: 5px 12px; border-radius: 999px; font-weight: 700; }
  .code {
    font-family: Consolas, monospace; font-size: 16.5px; line-height: 1.7;
    color: #b8b8c8; background: #1a1a26; border: 1px solid #2a2a3a;
    border-radius: 12px; padding: 18px;
  }
  .code .p { color: #a78bfa; font-weight: 700; }
  .code .g { color: #34d399; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="wrap">
    <div class="left">
      <div class="brand">
        <div class="mark">
          <svg width="46" height="46" viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="14" stroke="url(#g)" stroke-width="2"/>
            <path d="M10 16 L16 10 L22 16 L16 22 Z" stroke="url(#g)" stroke-width="2" fill="none"/>
            <defs><linearGradient id="g" x1="0" y1="0" x2="32" y2="32">
              <stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#60a5fa"/>
            </linearGradient></defs>
          </svg>
        </div>
        <h1>PromptLogo</h1>
      </div>
      <div class="tagline">한글로 선택하면,<br/><span class="hl">AI 로고 프롬프트</span>가 완성</div>
      <div class="sub">미드저니 · GPT · 나노바나나용 미니멀 로고 프롬프트를<br/>클릭 몇 번으로. 로컬 Gemma AI로 무료 강화까지.</div>
      <div class="chips">
        <div class="chip">🎨 Midjourney</div>
        <div class="chip">🤖 GPT</div>
        <div class="chip">🍌 나노바나나</div>
        <div class="chip ai">🖥️ 로컬 AI 무료</div>
      </div>
    </div>
    <div class="card">
      <div class="card-h">
        <div class="badge">5</div>
        <span>완성된 프롬프트</span>
        <span class="live">● 실시간</span>
      </div>
      <div class="code">
        A flat vector logo of <span class="p">a coffee bean</span> forming a rising sun, negative space, minimalist, clean lines, pure white background <span class="g">--ar 1:1 --style raw</span>
      </div>
    </div>
  </div>
</body>
</html>
